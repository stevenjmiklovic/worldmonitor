name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    # No secrets needed — run for all PRs including forks

    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:data
      - run: npm run test:sidecar
