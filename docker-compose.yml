services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  redis-http:
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: localdev
      SRH_CONNECTION_STRING: redis://redis:6379
    depends_on:
      - redis
